<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Outfit Picker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f4f1;--bg3:#eeecea;
  --text:#1a1a1a;--text2:#6b6a67;--text3:#9e9d9a;
  --border:rgba(0,0,0,.10);--border2:rgba(0,0,0,.18);
  --accent:#1a1a1a;--green:#2d7a4f;--green-bg:#eaf5ef;
  --radius-md:8px;--radius-lg:14px;--radius-xl:20px;
  --serif:Georgia,"Times New Roman",serif;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1a1a1a;--bg2:#242424;--bg3:#2e2e2e;
    --text:#f0efe8;--text2:#9e9d97;--text3:#6b6a65;
    --border:rgba(255,255,255,.10);--border2:rgba(255,255,255,.18);
    --green:#4caf7d;--green-bg:#1a3329;
  }
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans)}
#app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.screen{display:none;flex:1;flex-direction:column;padding:1.25rem 1rem 90px;overflow-y:auto}
.screen.active{display:flex}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;display:flex;background:var(--bg);border-top:.5px solid var(--border2);z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 12px;cursor:pointer;border:none;background:none;color:var(--text3);font-size:11px;font-family:var(--sans);transition:color .15s;-webkit-tap-highlight-color:transparent}
.nav-tab i{font-size:22px}
.nav-tab.active{color:var(--text)}
.stitle{font-size:22px;font-weight:600;color:var(--text);margin-bottom:3px}
.ssub{font-size:13px;color:var(--text2);margin-bottom:1.25rem;line-height:1.4}

/* WARDROBE */
.cat-tabs{display:flex;gap:7px;overflow-x:auto;padding-bottom:10px;margin-bottom:1rem;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.cat-tabs::-webkit-scrollbar{display:none}
.ct{white-space:nowrap;padding:6px 13px;border-radius:20px;border:.5px solid var(--border2);font-size:13px;font-family:var(--sans);cursor:pointer;background:none;color:var(--text2);transition:all .15s;-webkit-tap-highlight-color:transparent}
.ct.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.wgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.wcard{background:var(--bg2);border-radius:var(--radius-lg);overflow:hidden;border:.5px solid var(--border)}
.wcard img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block}
.wcard-body{padding:8px 10px 10px}
.wcard-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wcard-cat{font-size:11px;color:var(--text2);margin-top:1px}

/* OUTFITS */
.outfit-nav{display:flex;align-items:center;gap:8px;margin-bottom:1rem}
.outfit-counter{flex:1;text-align:center;font-size:13px;color:var(--text2)}
.btn-icon{width:40px;height:40px;border-radius:50%;border:.5px solid var(--border2);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);font-size:20px;-webkit-tap-highlight-color:transparent;flex-shrink:0}
.btn-icon:active{background:var(--bg2)}
.shuffle-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:11px;border:.5px solid var(--border2);border-radius:var(--radius-lg);background:none;font-size:13px;color:var(--text2);font-family:var(--sans);cursor:pointer;margin-bottom:1rem;-webkit-tap-highlight-color:transparent}

.ocard{background:var(--bg);border:.5px solid var(--border2);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1rem}
.ocat{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.otitle{font-size:19px;font-weight:500;font-family:var(--serif);color:var(--text);margin-bottom:6px;font-style:italic}
.oration{font-size:13px;color:var(--text2);line-height:1.55;margin-bottom:12px}
.alt-shirt{background:var(--bg2);border-radius:var(--radius-md);padding:8px 12px;font-size:12px;color:var(--text2);margin-bottom:12px;border-left:3px solid var(--border2);border-top-left-radius:0;border-bottom-left-radius:0}
.alt-shirt strong{color:var(--text);font-weight:500}
.odiv{height:.5px;background:var(--border);margin-bottom:12px}
.oitems{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.orow{display:flex;align-items:center;gap:10px}
.othumb{width:96px;height:116px;border-radius:10px;object-fit:cover;border:.5px solid var(--border);flex-shrink:0;background:var(--bg2)}
.oiinfo{flex:1;min-width:0}
.oicat{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.oiname{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.wore-btn{width:100%;padding:13px;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius-lg);font-size:15px;font-weight:500;font-family:var(--sans);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-tap-highlight-color:transparent;transition:opacity .15s}
.wore-btn:active{opacity:.8}
.wore-btn.worn{background:var(--green-bg);color:var(--green);border:.5px solid var(--green)}

/* HISTORY */
.history-empty{text-align:center;padding:3rem 1rem;color:var(--text2)}
.history-empty i{font-size:44px;margin-bottom:1rem;display:block;color:var(--text3)}
.history-empty p{font-size:14px;line-height:1.6}
.hcard{background:var(--bg2);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.hcard-info{flex:1;min-width:0}
.hcard-title{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hcard-date{font-size:12px;color:var(--text2);margin-top:2px}
.hcard-count{background:var(--text);color:var(--bg);border-radius:20px;font-size:12px;font-weight:500;padding:3px 10px;white-space:nowrap;flex-shrink:0}
.history-clear{width:100%;padding:12px;background:none;border:.5px solid var(--border2);border-radius:var(--radius-lg);font-size:14px;color:var(--text3);font-family:var(--sans);cursor:pointer;margin-top:1rem;-webkit-tap-highlight-color:transparent}
.history-stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:1.25rem}
.hstat{background:var(--bg2);border-radius:var(--radius-md);padding:12px;text-align:center}
.hstat-num{font-size:24px;font-weight:500;color:var(--text)}
.hstat-lbl{font-size:11px;color:var(--text2);margin-top:2px}

.toast{position:fixed;top:1.25rem;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 18px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;font-family:var(--sans)}
.toast.show{opacity:1}

.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.lightbox.open{display:flex}
.lightbox img{max-width:92vw;max-height:88vh;border-radius:var(--radius-lg);object-fit:contain}
</style>
</head>
<body>
<div id="app">
  <div id="s-outfits" class="screen active">
    <p class="stitle">Get dressed</p>
    <p class="ssub">37 outfits — swipe through and pick your look</p>
    <div class="outfit-nav">
      <button class="btn-icon" onclick="prevOutfit()" aria-label="Previous"><i class="ti ti-chevron-left"></i></button>
      <span class="outfit-counter" id="ocounter">1 of 37</span>
      <button class="btn-icon" onclick="nextOutfit()" aria-label="Next"><i class="ti ti-chevron-right"></i></button>
    </div>
    <button class="shuffle-btn" onclick="shuffleOutfit()"><i class="ti ti-arrows-shuffle" style="font-size:16px"></i>Shuffle</button>
    <div id="ocard-container"></div>
  </div>

  <div id="s-history" class="screen">
    <p class="stitle">Wear history</p>
    <p class="ssub">Every outfit you've logged</p>
    <div class="history-stats" id="hstats"></div>
    <div id="hlist"></div>
    <button class="history-clear" onclick="clearHistory()">Clear all history</button>
  </div>

  <nav class="nav">
    <button class="nav-tab active" onclick="showS('outfits',this)"><i class="ti ti-shirt"></i>Outfits</button>
    <button class="nav-tab" onclick="showS('history',this);renderHistory()"><i class="ti ti-calendar"></i>History</button>
  </nav>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lbimg" src="" alt="Full size view" />
</div>
</div>
<div class="toast" id="toast"></div>

let curOutfit = 0;
let curFilter = 'all';
let history = [];

function toast(msg,dur=2000){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

function loadHistory(){
  try{history=JSON.parse(localStorage.getItem('outfit_history_v1')||'[]');}catch(e){history=[];}
}
function saveHistory(){
  localStorage.setItem('outfit_history_v1',JSON.stringify(history));
}

function showS(n,btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('s-'+n).classList.add('active');
  btn.classList.add('active');
}

function fCat(btn,cat){
  curFilter=cat;
  document.querySelectorAll('.ct').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  }

function renderWardrobe(){
  const g=document.getElementById('wgrid');
  const items=curFilter==='all'?WARDROBE_ITEMS:WARDROBE_ITEMS.filter(i=>i.cat===curFilter);
  g.innerHTML=items.map(item=>`
    <div class="wcard">
      <img src="${IMGS[item.key]||''}" alt="${item.name}" />
      <div class="wcard-body">
        <div class="wcard-name">${item.name}</div>
        <div class="wcard-cat">${item.cat}</div>
      </div>
    </div>`).join('');
}

function renderOutfit(){
  const o=OUTFITS[curOutfit];
  document.getElementById('ocounter').textContent=`${curOutfit+1} of ${OUTFITS.length}`;
  const wornToday=history.some(h=>h.id===o.id&&h.date===today());
  const itemsHtml=o.items.map(item=>`
    <div class="orow">
      <img class="othumb" src="${IMGS[item.key]||''}" alt="${item.name}" onclick="openLightbox(IMGS['${item.key}']||'')" style="cursor:zoom-in" />
      <div class="oiinfo">
        <div class="oicat">${item.role}</div>
        <div class="oiname">${item.name}</div>
      </div>
    </div>`).join('');
  const altHtml=o.altShirt?`<div class="alt-shirt"><strong>Also works with:</strong> ${o.altShirtName} <img src="${IMGS[o.altShirt]||''}" alt="${o.altShirtName}" style="width:44px;height:52px;border-radius:6px;object-fit:cover;vertical-align:middle;margin-left:8px;border:.5px solid var(--border)" /></div>`:'';
  document.getElementById('ocard-container').innerHTML=`
    <div class="ocard">
      <div class="ocat">${o.category} · Outfit ${o.id}</div>
      <div class="otitle">${o.title}</div>
      <div class="oration">${o.rationale}</div>
      ${altHtml}
      <div class="odiv"></div>
      <div class="oitems">${itemsHtml}</div>
      <button class="wore-btn ${wornToday?'worn':''}" onclick="logWorn(${o.id})">
        <i class="ti ${wornToday?'ti-check':'ti-calendar-plus'}"></i>
        ${wornToday?'Logged today':'I wore this'}
      </button>
    </div>`;
}

function prevOutfit(){
  curOutfit=(curOutfit-1+OUTFITS.length)%OUTFITS.length;
  renderOutfit();
}
function nextOutfit(){
  curOutfit=(curOutfit+1)%OUTFITS.length;
  renderOutfit();
}
function shuffleOutfit(){
  let next;
  do{next=Math.floor(Math.random()*OUTFITS.length);}while(next===curOutfit&&OUTFITS.length>1);
  curOutfit=next;
  renderOutfit();
}

function today(){
  return new Date().toISOString().slice(0,10);
}

function logWorn(id){
  const o=OUTFITS.find(x=>x.id===id);
  if(!o)return;
  const alreadyToday=history.some(h=>h.id===id&&h.date===today());
  if(alreadyToday){toast('Already logged today');return;}
  history.unshift({id,title:o.title,date:today(),ts:Date.now()});
  saveHistory();
  renderOutfit();
  toast('Logged — nice choice!');
}

function renderHistory(){
  
function openLightbox(src){
  document.getElementById('lbimg').src=src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
}

loadHistory();
  const counts={};
  const lastWorn={};
  history.forEach(h=>{
    counts[h.id]=(counts[h.id]||0)+1;
    if(!lastWorn[h.id])lastWorn[h.id]=h.date;
  });
  const totalWears=history.length;
  const uniqueOutfits=Object.keys(counts).length;
  document.getElementById('hstats').innerHTML=`
    <div class="hstat"><div class="hstat-num">${totalWears}</div><div class="hstat-lbl">Total wears</div></div>
    <div class="hstat"><div class="hstat-num">${uniqueOutfits}</div><div class="hstat-lbl">Outfits worn</div></div>`;
  if(!history.length){
    document.getElementById('hlist').innerHTML='<div class="history-empty"><i class="ti ti-calendar"></i><p>No outfits logged yet. Head to the Outfits tab and tap "I wore this" to start tracking.</p></div>';
    return;
  }
  const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  document.getElementById('hlist').innerHTML=sorted.map(([id,count])=>{
    const o=OUTFITS.find(x=>x.id===parseInt(id));
    if(!o)return '';
    const d=lastWorn[id];
    const fmt=new Date(d+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
    return`<div class="hcard">
      <img src="${IMGS[o.items[0].key]||''}" alt="${o.title}" style="width:72px;height:88px;border-radius:9px;object-fit:cover;flex-shrink:0;border:.5px solid var(--border);cursor:zoom-in" onclick="openLightbox(IMGS['\${id}']||'')" />
      <div class="hcard-info">
        <div class="hcard-title">${o.title}</div>
        <div class="hcard-date">Last worn ${fmt}</div>
      </div>
      <div class="hcard-count">${count}×</div>
    </div>`;
  }).join('');
}

function clearHistory(){
  if(!confirm('Clear all wear history?'))return;
  history=[];saveHistory();renderHistory();toast('History cleared');
}


function openLightbox(src){
  document.getElementById('lbimg').src=src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
}

loadHistory();
renderOutfit();
